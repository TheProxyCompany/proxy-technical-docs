site_name: The Proxy Company Documentation
site_description: Technical documentation for Proxy and Orchard, local intelligence on Apple Silicon
site_author: The Proxy Company
copyright: Copyright &copy; 2026 The Proxy Company

site_url: https://docs.theproxycompany.com/
repo_url: https://github.com/TheProxyCompany
repo_name: The Proxy Company
edit_uri: ""

theme:
  name: material
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.prune
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - palette.toggle
    - toc.integrate
  logo: assets/proxy-p-vector-tan.png
  favicon: assets/proxy-logo.png

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist
  - attr_list
  - md_in_html
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra:
  generator: false
  homepage: https://theproxycompany.com
  scope: /

extra_css:
  - assets/stylesheets/extra.css

nav:
  - Home: index.md
  - Proxy:
    - Overview: proxy/index.md
    - Getting Started: proxy/getting-started.md
    - Roster: proxy/roster.md
    - Life Map: proxy/life-map.md
    - Timeline: proxy/timeline.md
    - Party: proxy/party.md
    - Moves: proxy/moves.md
    - Integrations: proxy/integrations.md
    - Harnesses: proxy/harnesses.md
    - Credits: proxy/credits.md
    - CLI Reference: proxy/cli.md
  - Orchard:
    - Overview: orchard/index.md
    - Production Use: orchard/production.md
    - Getting Started: orchard/getting-started.md
    - Client Example: orchard/client.md
    - Server Example: orchard/server.md
    - Streaming: orchard/streaming.md
    - Batching: orchard/batching.md
    - Multimodal Input: orchard/multimodal.md
    - Structured Output: orchard/structured-output.md
    - Tool Use: orchard/tool-use.md
    - Reasoning Levels: orchard/reasoning.md
    - Rust Client: orchard/rust.md
    - How It Runs: orchard/architecture.md
  - proxy.ing:
    - Overview: proxy-ing/index.md
    - Getting Started: proxy-ing/getting-started.md
    - Routes: proxy-ing/routes.md
    - Device Approval: proxy-ing/device-approval.md
    - Client API: proxy-ing/client-api.md

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: false
      type: date

# For Vercel deployment
use_directory_urls: true
